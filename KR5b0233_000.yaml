body:
  text: 洞玄靈寶玉籙簡文三元威儀自然真經天尊曰靈寶中元宫中舊有三部威儀二千四百條自經龍漢之後至赤明元年上聖撰校抄集要用使下教真人應得道者凡八十條而今行焉中元玉籙簡文神仙品曰奉師威儀宜燒香凡修仙道當思經師所在之方心拜三過願師得仙道我身升度中元玉籙簡文神仙品曰奉師威儀思經師禮拜畢次思籍師所在之方心拜三過願師得飛仙為我開度七祖父母早升天堂我得道真升入無形中元玉籙簡文神仙品曰奉師威儀思籍師畢次思度師所在之方心拜三過願念師得升度上登髙仙為我開度五苦八難名入仙録永成真人中元玉籙簡文神仙品曰奉師威儀經師則經之始故宜設禮三寶之宗籍師則師之師故宜設禮生死録籍所曰度師則受經之師度我五道之難故應設禮為學不尊三師則三寶不降三界不敬鬼魔害身中元玉籙簡文神仙品曰奉經師威儀問訊經師上稱弟子某甲惶恐言後惶恐再拜中元玉籙簡文神仙品曰奉籍師威儀問訊籍師上稱曰記弟子某甲稽首後稽首再拜言中元玉籙簡文神仙品曰奉度師威儀問訊度師上稱具記弟子某甲言後再拜言中元玉籙簡文神仙品曰師答弟子威儀當稱名上謝後言敬謝中元玉籙簡文神仙品曰奉師威儀與師言皆當稱弟子某甲啓不得但稱弟子中元玉籙簡文神仙品曰奉師威儀男宫與師言皆稱名不得稱姓弟子也中元玉籙簡文神仙品曰奉師威儀女官與師言皆稱名言不得但稱姓弟子也中元玉籙簡文神仙品曰奉師威儀有所請求規問法事當先禮經師籍師各一拜畢再拜啓度師而自陳中元玉籙簡文神仙品曰詣師威儀當宿昔齊戒嚴裝法服端恭待旦載馳載欣中元玉籙簡文神仙品曰詣師威儀當正已趨行稽首俯仰安徐容序歡然對神中元玉籙簡文神仙品曰詣師威儀每當重掌纍足警行斂手心存上真中元玉籙簡文神仙品曰詣師威儀每當一心恭修禮敬斂手信禮注念分明中元玉籙簡文神仙品曰詣師威儀當專心正已意志玄虛恭肅禮拜動止安徐中元玉籙簡文神仙品曰詣師威儀揖讓禮拜崇向無為歡樂玄虛喜慶交至中元玉籙簡文神仙品曰詣師威儀當澡洗手足衣服潔素體有香熏氣合神景中元玉籙簡文神仙品曰詣師威儀施禮問訊當入齊堂燒香願念禮於三寶中元玉籙簡文神仙品曰詣師威儀當施法服科次左右端詳聽思中外應承中元玉籙簡文神仙品曰詣師威儀當振喜交集正顔直視祗畏悚息如履薄冰中元玉籙簡文神仙品曰詣師威儀當執手平坐儼然無虧為衆所觀中元玉籙簡文神仙品曰詣師威儀當修禮既畢當思已身受生所犯念自舉勵中元玉籙簡文神仙品曰詣師威儀念罪既畢靜思清虛存念神氣不相逺離中元玉籙簡文神仙品曰詣師威儀諸念既畢當起掃灑內外奉宣功勤效於恭敬中元玉籙簡文神仙品曰詣師威儀有所稽顙當起施禮然後還坐陳啓所心中元玉籙簡文神仙品曰詣師威儀當安徐聲氣吐納柔和勿得髙剛傷忤真氣中元玉籙簡文神仙品曰詣師威儀當擇言而道言以法音勿得輕忽妄及私鄙中元玉籙簡文神仙品曰詣師威儀當勤行直道勿得遊過倣徨二心中元玉籙簡文神仙品曰詣師威儀當男女各道勿得前却遲速相牽中元玉籙簡文神仙品曰詣師威儀男女整肅勿得低頭耳語淫視相當中元玉籙簡文神仙品曰詣師威儀有所啓索隨事以聞勿得避回私自竊取中元玉籙簡文神仙品曰詣師威儀當齎糧自隨勿得煩損師門求取無猒中元玉籙簡文神仙品曰詣師威儀當修整為意勿得糞草穢慢內外中元玉籙簡文神仙品曰詣師威儀當正已求真勿得懷挾背向不專中元玉籙簡文神仙品曰詣師威儀當清虛心口以注正真勿得飲酒濁亂神氣中元玉籙簡文神仙品曰詣師威儀當恭慎正事勿得稱道傳教假因精崇迷於愚短中元玉籙簡文神仙品曰詣師威儀當整顔慎言勿得調笑更相戲弄中元玉籙簡文神仙品曰詣師威儀當端恭承奉勿得側坐抵卧肘隱中元玉籙簡文神仙品曰詣師威儀當直造往反勿得攀牽傍徨遊揚中元玉籙簡文神仙品曰詣師威儀師有所問當斂板伏地稱名上對中元玉籙簡文神仙品曰詣師威儀當持戒自檢守死不移勿得雜念榮務塵濁中元玉籙簡文神仙品曰詣師威儀當令同氣形心齊平勿廣招引異類之人中元玉籙簡文神仙品曰詣師威儀宿止卧息當著衣服思真安定勿得解脫裸身露形中元玉籙簡文神仙品曰詣師威儀卧息起止當涉履徐步勿得狠戾奔走驚駭中元玉籙簡文神仙品曰詣師威儀冠帶巾幘每令整頓勿得露頭輕慢尊貴中元玉籙簡文神仙品曰詣師威儀當歡心欣喜如對大聖勿得瞋怒忿恚四輩中元玉籙簡文神仙品曰詣師威儀當欣欣吉慶勿得稱怨悲泣自悼中元玉籙簡文神仙品曰詣師威儀當修禮節揖讓進退勿得强弱相承無有尊敬中元玉籙蕳文神仙品曰詣師威儀當念施忠孝仁慈篤義勿行嫉妬懷抱不道中元玉籙簡文神仙品曰詣師威儀當藏惡宣善每引四輩勿得毀謗抑遏頑短中元玉籙簡文神仙品曰詣師威儀當思開化廣度天人勿得閉匿遏塞頑人中元玉籙簡文神仙品曰詣師威儀當開悟愚短令入法門勿得蔽道隱真自取功名中元玉籙簡文神仙品曰詣師威儀當念普天同見法門勿得異念存想邪徑中元玉籙簡文神仙品曰詣師威儀當念師家普得飛行身得侍從上登大聖中元玉籙簡文神仙品曰詣師威儀當請問科戒勿得闞窺發泄經書中元玉籙簡文神仙品曰詣師威儀當注一事勿得傲戲弄師服玩開看箱篋中元玉籙簡文神仙品曰詣師威儀當齎紙自隨勿得輒取師家筆墨以供己用中元玉籙簡文神仙品曰詣師威儀當請問經戒尊承袐重勿妄宣傳